name: Bug report
description: Report reproducible HyprSequoia behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Remove private data from logs before attaching them.
  - type: input
    id: version
    attributes: {label: HyprSequoia version, placeholder: v0.1.0}
    validations: {required: true}
  - type: dropdown
    id: gpu
    attributes: {label: GPU, options: [AMD, Intel, NVIDIA, Other]}
    validations: {required: true}
  - type: textarea
    id: steps
    attributes: {label: Reproduction steps}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected behavior}
    validations: {required: true}
  - type: textarea
    id: logs
    attributes: {label: Relevant sanitized logs, render: shell}
