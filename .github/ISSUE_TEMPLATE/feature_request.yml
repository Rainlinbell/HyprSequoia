name: Feature request
description: Propose a focused desktop improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes: {label: User problem, description: Describe the need rather than only a proposed implementation.}
    validations: {required: true}
  - type: textarea
    id: solution
    attributes: {label: Proposed experience}
    validations: {required: true}
  - type: textarea
    id: alternatives
    attributes: {label: Alternatives considered}
