name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install linters
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq desktop-file-utils
      - name: ShellCheck
        run: shellcheck -x -P SCRIPTDIR install.sh update.sh restore.sh uninstall-kde.sh scripts/lib/*.sh scripts/bin/* configs/waybar/scripts/*.sh configs/dock/scripts/*.sh configs/walker/scripts/*.sh
      - name: Validate JSON
        run: find . -type f -name '*.json' -print0 | xargs -0 -n1 jq empty
      - name: Validate Waybar JSONC
        run: jq empty configs/waybar/config.jsonc configs/dock/config.jsonc
      - name: Reject removed Hyprland syntax
        run: |
          ! grep -RInE '^[[:space:]]*(windowrulev2[[:space:]]*=|gestures[[:space:]]*\{|[[:space:]]*workspace_swipe(_fingers)?[[:space:]]*=|layerrule[[:space:]]*=[[:space:]]*(blur|ignorezero),)' configs/hypr
      - name: Validate Dock TOML
        run: python -c 'import tomllib, pathlib; tomllib.loads(pathlib.Path("configs/dock/nwg-dock-config.toml").read_text())'
      - name: Validate Walker TOML, XML, and SVG
        run: |
          python -c 'import tomllib, pathlib; tomllib.loads(pathlib.Path("configs/walker/config.toml").read_text())'
          python -c 'import pathlib, xml.etree.ElementTree as ET; [ET.parse(path) for path in pathlib.Path("configs/walker/themes").rglob("*.xml")]'
          python -c 'import pathlib, xml.etree.ElementTree as ET; [ET.parse(path) for path in pathlib.Path("configs/hypr/wallpapers").rglob("*.svg")]'
      - name: Validate desktop entries
        run: desktop-file-validate configs/applications/*.desktop
      - name: Reject trailing whitespace
        run: '! grep -RInE "[[:blank:]]+$" --exclude-dir=.git .'
