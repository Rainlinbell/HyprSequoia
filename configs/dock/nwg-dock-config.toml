# Configuration for the preferred Rust nwg-dock backend.
# Runtime flags supplied by scripts/dock.sh intentionally override these values.

[behavior]
autohide = false
resident = true
multi = true
hide-timeout = 0
hotspot-delay = 0

[layout]
position = "bottom"
alignment = "center"
mb = 10
layer = "overlay"
exclusive = true

[appearance]
icon-size = 48
opacity = 78
launch-animation = true

[launcher]
launcher-pos = "end"
nolauncher = false

[filters]
# Keep all client windows visible; users can add class filters locally.
