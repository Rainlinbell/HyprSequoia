input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        clickfinger_behavior = true
    }
}
# Hyprland 0.55 removed workspace_swipe/workspace_swipe_fingers in favor of
# the gesture keyword. This form is also accepted by current 0.5x releases.
gesture = 3, horizontal, workspace
