general {
    gaps_in = 8
    gaps_out = 14
    border_size = 1
    col.active_border = rgba(78abffff)
    col.inactive_border = rgba(ffffff20)
    resize_on_border = true
}
decoration {
    rounding = 16
    active_opacity = 0.98
    inactive_opacity = 0.94
    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(00000066)
    }
    blur {
        enabled = true
        size = 12
        passes = 4
        vibrancy = 0.24
    }
}
animations {
    enabled = true
    bezier = tahoe, 0.22, 1, 0.36, 1
    animation = windows, 1, 5, tahoe, popin 88%
    animation = workspaces, 1, 5, tahoe, slide
    animation = fade, 1, 4, tahoe
}
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgba(12243bff)
}
