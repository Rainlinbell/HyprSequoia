general {
    gaps_in = 6
    gaps_out = 12
    border_size = 1
    col.active_border = rgba(7aa2f7cc)
    col.inactive_border = rgba(ffffff18)
    resize_on_border = true
}
decoration {
    rounding = 12
    active_opacity = 0.98
    inactive_opacity = 0.94
    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = rgba(00000055)
    }
    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.18
    }
}
animations {
    enabled = true
    bezier = sequoia, 0.22, 1, 0.36, 1
    animation = windows, 1, 5, sequoia, popin 85%
    animation = workspaces, 1, 5, sequoia, slide
    animation = fade, 1, 4, sequoia
}
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgba(12243bff)
}
