# Hyprland 0.53+ window-rule syntax. The former windowrulev2 matcher was
# removed and is reported as a configuration error by current Arch packages.
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = size (monitor_w*0.70) (monitor_h*0.75), match:class ^(org.pulseaudio.pavucontrol)$

# Hyprland 0.53+ layer-rule syntax. `ignore_alpha 0` replaces the removed
# `ignorezero` spelling while retaining the transparent rounded surface.
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = animation fade, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = blur on, match:namespace walker
layerrule = blur_popups on, match:namespace walker
layerrule = ignore_alpha 0, match:namespace walker
layerrule = animation fade, match:namespace walker
layerrule = blur on, match:namespace nwg-dock
layerrule = ignore_alpha 0, match:namespace nwg-dock
layerrule = blur on, match:namespace hyprsequoia-dock
layerrule = ignore_alpha 0, match:namespace hyprsequoia-dock
