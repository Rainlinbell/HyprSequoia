# HyprSequoia root configuration. Modules are ordered by responsibility.
source = ~/.config/hypr/conf.d/10-environment.conf
source = ~/.config/hypr/conf.d/15-monitors.conf
source = ~/.config/hypr/conf.d/20-input.conf
source = ~/.config/hypr/conf.d/30-appearance.conf
source = ~/.config/hypr/conf.d/40-rules.conf
source = ~/.config/hypr/conf.d/50-bindings.conf
source = ~/.config/hypr/conf.d/60-autostart.conf

# Keep personal monitor, input, and application overrides outside the managed
# modules. The installer creates this file once and preserves it on updates.
source = ~/.config/hypr/local.conf
